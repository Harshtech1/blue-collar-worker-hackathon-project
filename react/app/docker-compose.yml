version: "3.9"

# ──────────────────────────────────────────────────────────────────────────────
# PRIORITY 4 FIX: Stripped-down docker-compose.yml
#
# Previous version referenced nonexistent Dockerfiles and a broken nginx gateway
# with 5 of 7 upstream services missing → HTTP 502 for most routes.
#
# This version contains ONLY the 3 services that actually exist and work:
#   1. rahi-api     → Node.js/Express Backend on port 5000
#   2. rahi-chatbot → Python FastAPI chatbot on port 8004
#   3. mongo        → MongoDB 7 on port 27017
#
# The React frontend is NOT containerized here — run it with `npm run dev`
# during the hackathon demo for faster iteration. For a proper build, see
# the Dockerfile.frontend build step below (commented out for reference).
# ──────────────────────────────────────────────────────────────────────────────

services:
  # =============================================================
  # Backend — Node.js / Express + Socket.IO
  # =============================================================
  rahi-api:
    build:
      context: ./Backend
      dockerfile: Dockerfile
    container_name: rahi-api
    ports:
      - "5000:5000"
    env_file:
      - ./Backend/.env
    environment:
      - NODE_ENV=production
      - CLIENT_URL=http://localhost:5173
    depends_on:
      mongo:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/api/health"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - rahi-network
    restart: unless-stopped

  # =============================================================
  # Chatbot — Python FastAPI (Groq / LangGraph)
  # =============================================================
  rahi-chatbot:
    build:
      context: ./react/app/microservices/chatbot-service
      dockerfile: Dockerfile
    container_name: rahi-chatbot
    ports:
      - "8004:8004"
    environment:
      - GROQ_API_KEY=${GROQ_API_KEY:-}
    networks:
      - rahi-network
    restart: unless-stopped

  # =============================================================
  # Database — MongoDB 7
  # =============================================================
  mongo:
    image: mongo:7
    container_name: rahi-mongo
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - rahi-network
    restart: unless-stopped

# =============================================================
# Volumes & Networks
# =============================================================
volumes:
  mongo_data:

networks:
  rahi-network:
    driver: bridge
